<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product — Northstar Goods</title>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <div class="announcement-bar"><div class="container announcement-inner"><span>Free shipping on orders over $50</span><span>•</span><span>30-day returns</span><span>•</span><span>Secure checkout concept</span></div></div>
  <header class="topbar">
    <div class="container nav">
      <a class="brand" href="index.html"><img class="brand-logo" src="assets/logo-wordmark.svg" alt="Northstar Goods" /></a>
      <nav class="nav-links">
        <a data-nav href="index.html">Home</a>
        <a data-nav href="catalog.html">Shop</a>
        <a data-nav href="faq.html">FAQ</a>
        <a data-nav href="contact.html">Contact</a>
      </nav>
      <div class="nav-actions"><button class="nav-icon" data-open-cart aria-label="Open cart">🛍️<span id="cart-count" class="cart-count">0</span></button></div>
    </div>
  </header>

  <main class="container">
    <section class="section" style="padding-top: 34px;">
      <div id="product-detail"></div>
    </section>
  </main>

  <footer class="container footer footer-store">
    <div><img class="brand-logo" src="assets/logo-wordmark.svg" alt="Northstar Goods" /></div>
    <div class="footer-links"><a href="shipping.html">Shipping</a><a href="returns.html">Returns</a><a href="faq.html">FAQ</a><a href="contact.html">Contact</a></div>
  </footer>

  <div id="cart-overlay" class="cart-overlay"></div>
  <aside class="cart-drawer" aria-label="Shopping cart">
    <div class="cart-header"><div class="cart-title-row"><strong>Your cart</strong><button id="cart-close" class="cart-close">×</button></div></div>
    <div id="cart-items" class="cart-items"></div>
    <div class="cart-footer"><div class="cart-summary-row"><span>Subtotal</span><strong id="cart-subtotal">$0</strong></div><a class="button primary" href="checkout.html" style="width:100%;">Proceed to checkout</a></div>
  </aside>

  <script src="assets/data.js"></script>
  <script src="assets/app.js"></script>
</body>
</html>
